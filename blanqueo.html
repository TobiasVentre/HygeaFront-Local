<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygea - Olvidé mi Clave</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/blanqueo.css">
</head>
<body>
    <div class="blanqueo-container">
        <a href="https://hygeagroup.com.ar/" class="back-to-home">
            <i class="fas fa-arrow-left"></i>
            Volver al inicio
        </a>
        
        <div class="blanqueo-card">
            <div class="blanqueo-header">
                <div class="blanqueo-logo">
                    <i class="fas fa-heart"></i>
                    <span>Hygea</span>
                </div>
                <h1 class="blanqueo-title">Olvidé mi Clave</h1>
                <p class="blanqueo-subtitle">Ingresá tu correo electrónico y te enviaremos las instrucciones para recuperar tu contraseña</p>
            </div>

            <form class="blanqueo-form" id="blanqueoForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div id="resetConfirmFields" style="display:none;">
                    <div class="form-group">
                        <label for="resetCode">Codigo de restablecimiento</label>
                        <div class="input-icon">
                            <i class="fas fa-key"></i>
                            <input type="text" id="resetCode" name="resetCode" placeholder="XXXXXX" maxlength="6" pattern="[A-Za-z0-9]{6}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Nueva contrasena</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPassword" name="newPassword" minlength="8" placeholder="Minimo 8 caracteres">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar contrasena</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" minlength="8" placeholder="Repite la contrasena">
                        </div>
                    </div>
                </div>

                <div class="confirm-feedback" id="resetFeedback" role="alert" aria-live="polite" style="display:none;"></div>

                <button type="submit" class="blanqueo-button" id="blanqueoButton">
                    <i class="fas fa-paper-plane"></i>
                    Enviar Instrucciones
                </button>
            </form>

            <div class="blanqueo-footer">
                <p class="login-link">
                    ¿Recordaste tu contraseña? <a href="login.html">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="js/blanqueo.js"></script>
</body>
</html>
